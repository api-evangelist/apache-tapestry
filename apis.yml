aid: apache-tapestry
name: Apache Tapestry
description: >-
  Apache Tapestry is a component-oriented framework for creating highly scalable web applications
  in Java. It provides a component-based development model with live class reloading, built-in
  Ajax support, type-safe URL generation, strong convention-over-configuration principles, and
  deep IDE integration. Tapestry applications are highly testable and work well with dependency
  injection via Tapestry IoC. It is maintained by the Apache Software Foundation.
