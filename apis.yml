apis:
  - aid: apache-tapestry:apache-tapestry-component-api
    name: Apache Tapestry Component API
    description: >-
      The Tapestry Component API provides Java annotations and interfaces for building reusable
      web components. Components are defined by a Java class and an HTML template file. The API
      includes @Component, @Property, @Parameter, @InjectPage, @OnEvent annotations for component
      wiring, event handling, and page navigation. Tapestry also provides built-in components for
      forms, loops, conditionals, and Ajax event handling.
    humanURL: https://tapestry.apache.org/component-classes.html
    tags:
      - Java
      - Components
      - Web Framework
      - Ajax
    properties:
      - type: Documentation
        url: https://tapestry.apache.org/component-classes.html
      - type: APIReference
        url: https://tapestry.apache.org/apidocs/
      - type: SDK
        url: https://search.maven.org/search?q=org.apache.tapestry
        title: Maven Java SDK
